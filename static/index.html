<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiro Code Gen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; color: #e94560; }
header span { font-size: 12px; color: #666; }
#messages { flex: 1; overflow-y: auto; padding: 24px; }
.turn { margin-bottom: 24px; }
.user-msg { background: #0f3460; padding: 12px 16px; border-radius: 12px 12px 0 12px; max-width: 80%; margin-left: auto; margin-bottom: 12px; }
.steps-panel { background: #16213e; border-radius: 12px; padding: 16px; max-width: 90%; }
.step { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin: 4px 0; background: #0a0a1a; border-radius: 8px; font-size: 14px; }
.step-icon { width: 22px; text-align: center; flex-shrink: 0; font-size: 16px; }
.step.running .step-icon { animation: pulse 1.2s infinite; }
.step.done .step-msg { color: #4ade80; }
.step.failed .step-msg { color: #f87171; }
.meta { font-size: 12px; color: #666; margin-top: 12px; padding-top: 8px; border-top: 1px solid #0f3460; }
.error { color: #f87171; padding: 8px 12px; background: #1c0a0a; border-radius: 8px; margin: 4px 0; font-size: 14px; }
.manual-card { background: #0f1b30; border: 1px solid #1e3a5f; border-radius: 12px; padding: 20px 24px; margin-top: 12px; font-size: 14px; line-height: 1.7; }
.manual-card h1, .manual-card h2, .manual-card h3 { color: #e94560; margin: 16px 0 8px; }
.manual-card h1 { font-size: 20px; } .manual-card h2 { font-size: 16px; } .manual-card h3 { font-size: 14px; }
.manual-card p { margin: 6px 0; }
.manual-card code { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; font-size: 13px; color: #4ade80; }
.manual-card pre { background: #1a1a2e; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.manual-card pre code { padding: 0; background: none; }
.manual-card ul, .manual-card ol { padding-left: 20px; margin: 6px 0; }
.manual-card li { margin: 4px 0; }
#input-area { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; }
#prompt { flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 14px; resize: none; height: 48px; }
#prompt:focus { outline: none; border-color: #e94560; }
#send { padding: 12px 24px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<header>
  <h1>Kiro Code Gen</h1>
  <span>AI 全自动：代码生成 → 编译 → 测试 → 部署 → 验证 → 使用手册</span>
</header>
<div id="messages"></div>
<div id="input-area">
  <textarea id="prompt" placeholder="描述你想要的程序..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send" onclick="send()">发送</button>
</div>
<script>
const messagesEl = document.getElementById('messages');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
let sessionId = null;

async function initSession() {
  const res = await fetch('/session/new', {method: 'POST'});
  const data = await res.json();
  sessionId = data.session_id;
}
initSession();

const ICONS = { running: '⏳', done: '✅', failed: '❌' };

function md(text) {
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.split('\n\n').map(p => p.startsWith('<') ? p : `<p>${p}</p>`).join('\n');
  return h;
}

function addStep(panel, status, message) {
  const div = document.createElement('div');
  div.className = 'step ' + status;
  div.innerHTML = `<div class="step-icon">${ICONS[status] || '⏳'}</div><div class="step-msg">${message}</div>`;
  panel.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function updateStep(el, status, message) {
  if (!el) return;
  el.className = 'step ' + status;
  el.querySelector('.step-icon').textContent = ICONS[status] || '⏳';
  if (message) el.querySelector('.step-msg').textContent = message;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text || !sessionId) return;
  promptEl.value = '';
  sendBtn.disabled = true;

  const turn = document.createElement('div');
  turn.className = 'turn';
  const userMsg = document.createElement('div');
  userMsg.className = 'user-msg';
  userMsg.textContent = text;
  turn.appendChild(userMsg);
  const panel = document.createElement('div');
  panel.className = 'steps-panel';
  turn.appendChild(panel);
  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  let currentStep = null;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: text, session_id: sessionId})
    });

    if (res.status === 429) {
      const err = document.createElement('div');
      err.className = 'error';
      err.textContent = '有其他用户正在使用，请稍后重试';
      panel.appendChild(err);
      sendBtn.disabled = false;
      promptEl.focus();
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') break;

        try {
          const j = JSON.parse(raw);

          if (j.type === 'step') {
            if (j.status === 'running') {
              currentStep = addStep(panel, 'running', j.message);
            } else if (j.status === 'done') {
              if (currentStep) {
                updateStep(currentStep, 'done', j.message);
              } else {
                addStep(panel, 'done', j.message);
              }
              currentStep = null;
            } else if (j.status === 'failed') {
              if (currentStep) {
                updateStep(currentStep, 'failed', j.message);
              } else {
                addStep(panel, 'failed', j.message);
              }
              currentStep = null;
            }

          } else if (j.type === 'meta') {
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = `上下文使用: ${j.context_pct}%`;
            panel.appendChild(meta);
            messagesEl.scrollTop = messagesEl.scrollHeight;

          } else if (j.type === 'manual') {
            const card = document.createElement('div');
            card.className = 'manual-card';
            card.innerHTML = md(j.content || '');
            panel.appendChild(card);
            messagesEl.scrollTop = messagesEl.scrollHeight;

          } else if (j.type === 'error') {
            const err = document.createElement('div');
            err.className = 'error';
            err.textContent = j.message;
            panel.appendChild(err);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    const err = document.createElement('div');
    err.className = 'error';
    err.textContent = '请求失败: ' + e.message;
    panel.appendChild(err);
  }
  sendBtn.disabled = false;
  promptEl.focus();
}
</script>
</body>
</html>
